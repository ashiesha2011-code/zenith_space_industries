<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investors | Zenith Space Industries</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="images/favicon2.png">
<link rel="stylesheet" href="style.css">

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>
(function(){
emailjs.init("Tkxlby0oNi8WW--TQ");
})();
</script>
</head>

<body>

<nav class="navbar">
    <a href="index.html">Home</a>
    <a href="missions.html">Missions</a>
    <a href="technology.html">Technology</a>
    <a href="investor.html">Investors</a>
</nav>

<section class="investor-section">
    <h1>Investor Relations</h1>
    <p>Partner with Zenith Space Industries in shaping the future of space exploration.</p>

    <div class="form-container">

        <form id="investor-form">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="tel" name="phone" placeholder="Phone Number">
            <textarea name="message" rows="4" placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>

        <div class="success-message" id="success-msg">
            ✅ Message sent successfully. Our team will contact you shortly.
        </div>

    </div>
</section>

<script>

document.getElementById("investor-form").addEventListener("submit", function(e) {
    e.preventDefault();

    emailjs.sendForm(
        "service_u8nde9e",
        "template_2ya8dv4",
        this
    ).then(function() {

        document.getElementById("success-msg").style.display = "block";
        document.getElementById("investor-form").reset();

    }, function(error) {

        alert("Something went wrong. Please try again.");

    });
});

</script>

</body>
</html>
