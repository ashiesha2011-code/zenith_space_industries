<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investors | Zenith Space Industries</title>

<link rel="stylesheet" href="style.css">

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>
(function(){
emailjs.init("Tkxlby0oNi8WW--TQ");
})();
</script>

<style>

body {
    background: #0a0f1c;
    color: white;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
}

.navbar a {
    position: relative;
    transition: 0.3s;
}

.navbar a:hover {
    color: #00f2ff;
    text-shadow: 0 0 8px #00f2ff;
}

/* Form Section */

.investor-section {
    padding: 80px 20px;
    text-align: center;
}

.investor-section h1 {
    font-size: 40px;
    margin-bottom: 20px;
}

.form-container {
    max-width: 500px;
    margin: auto;
    background: rgba(255,255,255,0.05);
    padding: 40px;
    border-radius: 12px;
    backdrop-filter: blur(10px);
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin: 12px 0;
    border: none;
    border-radius: 6px;
    background: rgba(255,255,255,0.1);
    color: white;
}

input:focus, textarea:focus {
    outline: none;
    box-shadow: 0 0 10px #00f2ff;
}

button {
    width: 100%;
    padding: 12px;
    background: #00f2ff;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    box-shadow: 0 0 15px #00f2ff;
}

/* Success Message */

.success-message {
    display: none;
    margin-top: 20px;
    padding: 12px;
    background: rgba(0,255,150,0.1);
    border: 1px solid #00ffcc;
    border-radius: 6px;
    animation: fadeIn 0.5s ease-in-out;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

</style>
</head>

<body>

<nav class="navbar">
    <a href="index.html">Home</a>
    <a href="missions.html">Missions</a>
    <a href="technology.html">Technology</a>
    <a href="investor.html">Investors</a>
</nav>

<section class="investor-section">
    <h1>Investor Relations</h1>
    <p>Partner with Zenith Space Industries in shaping the future of space exploration.</p>

    <div class="form-container">

        <form id="investor-form">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="tel" name="phone" placeholder="Phone Number">
            <textarea name="message" rows="4" placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>

        <div class="success-message" id="success-msg">
            ✅ Message sent successfully. Our team will contact you shortly.
        </div>

    </div>
</section>

<script>

document.getElementById("investor-form").addEventListener("submit", function(e) {
    e.preventDefault();

    emailjs.sendForm(
        "service_u8nde9e",
        "template_2ya8dv4",
        this
    ).then(function() {

        document.getElementById("success-msg").style.display = "block";
        document.getElementById("investor-form").reset();

    }, function(error) {

        alert("Something went wrong. Please try again.");

    });
});

</script>

</body>
</html>
