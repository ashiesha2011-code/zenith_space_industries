<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Investors | Zenith Space Industries</title>

<!-- Orbitron Font (Same as Other Pages) -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

<!-- Main Styles -->
<link rel="stylesheet" href="style.css">

<!-- Favicon -->
<link rel="icon" type="image/png" href="favicon.png">

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
(function(){
emailjs.init("Tkxlby0oNi8WW--TQ");
})();
</script>

<style>

/* Ensure theme consistency */
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background-color: #0b0f1a;
    color: #ffffff;
}

/* Navbar Layout (Same Structure) */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 60px;
    background: transparent;
}

.logo img {
    height: 85px;
}

.nav-links a {
    margin-left: 30px;
    text-decoration: none;
    color: white;
    transition: 0.3s ease;
}

/* Subtle Glow Hover */
.nav-links a:hover {
    color: #00bcd4;
    text-shadow: 0 0 8px #00bcd4;
}

/* Section Styling */
.investor-section {
    padding: 120px 20px;
    text-align: center;
}

.investor-section h1 {
    font-size: 48px;
    font-weight: 700;
    margin-bottom: 15px;
}

.investor-section p {
    opacity: 0.7;
    margin-bottom: 60px;
}

/* Form Container */
.form-container {
    max-width: 600px;
    margin: auto;
}

/* Inputs */
input, textarea {
    width: 100%;
    padding: 14px;
    margin: 15px 0;
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 4px;
    color: white;
    font-family: 'Orbitron', sans-serif;
}

input:focus, textarea:focus {
    outline: none;
    border-color: #00bcd4;
    box-shadow: 0 0 8px rgba(0,188,212,0.5);
}

/* Button */
button {
    width: 100%;
    padding: 14px;
    background: #00bcd4;
    border: none;
    border-radius: 4px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0097a7;
    box-shadow: 0 0 12px rgba(0,188,212,0.6);
}

/* Success Message */
.success-message {
    display: none;
    margin-top: 20px;
    padding: 12px;
    border: 1px solid #00bcd4;
    background: rgba(0,188,212,0.08);
    border-radius: 4px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

    <div class="logo">
        <a href="index.html">
            <img src="images/logo.png" alt="ZSI Logo">
        </a>
    </div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="missions.html">Missions</a>
        <a href="technology.html">Technology</a>
        <a href="investor.html">Investors</a>
    </div>

</nav>

<!-- INVESTOR SECTION -->
<section class="investor-section">

    <h1>Investor Relations</h1>
    <p>Partner with Zenith Space Industries in shaping the future of space exploration.</p>

    <div class="form-container">

        <form id="investor-form">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="tel" name="phone" placeholder="Phone Number">
            <textarea name="message" rows="4" placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>

        <div class="success-message" id="success-msg">
            ✅ Message sent successfully. Our team will contact you shortly.
        </div>

    </div>

</section>

<script>

document.getElementById("investor-form").addEventListener("submit", function(e) {
    e.preventDefault();

    emailjs.sendForm(
        "service_u8nde9e",
        "template_2ya8dv4",
        this
    ).then(function() {

        document.getElementById("success-msg").style.display = "block";
        document.getElementById("investor-form").reset();

    }, function(error) {

        alert("Something went wrong. Please try again.");

    });
});

</script>

</body>
</html>
