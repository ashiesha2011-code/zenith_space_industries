<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investors | Zenith Space Industries</title>
<link rel="icon" type="image/png" href="images/favicon2.png">
<link rel="stylesheet" href="style.css">

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>
(function(){
emailjs.init("Tkxlby0oNi8WW--TQ");
})();
</script>

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0b0f1a;
    color: #ffffff;
}

/* Navbar Glow */
.navbar a {
    transition: 0.3s ease;
}

.navbar a:hover {
    color: #00bcd4;
    text-shadow: 0 0 6px #00bcd4;
}

/* Section */
.investor-section {
    padding: 100px 20px;
    text-align: center;
    background: linear-gradient(to bottom, #0b0f1a, #111827);
}

.investor-section h1 {
    font-size: 42px;
    margin-bottom: 10px;
    letter-spacing: 1px;
}

.investor-section p {
    opacity: 0.7;
    margin-bottom: 50px;
}

/* Form Container */
.form-container {
    max-width: 600px;
    margin: auto;
    padding: 40px;
}

/* Inputs */
input, textarea {
    width: 100%;
    padding: 14px;
    margin: 15px 0;
    border-radius: 4px;
    border: 1px solid #1f2937;
    background: #111827;
    color: white;
    font-size: 14px;
}

input:focus, textarea:focus {
    outline: none;
    border-color: #00bcd4;
    box-shadow: 0 0 8px rgba(0,188,212,0.5);
}

/* Button */
button {
    width: 100%;
    padding: 14px;
    background: #00bcd4;
    border: none;
    border-radius: 4px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0097a7;
}

/* Success Message */
.success-message {
    display: none;
    margin-top: 20px;
    padding: 12px;
    border: 1px solid #00bcd4;
    background: rgba(0,188,212,0.08);
    border-radius: 4px;
}

</style>
</head>

<body>

<nav class="navbar">
    <a href="index.html">Home</a>
    <a href="missions.html">Missions</a>
    <a href="technology.html">Technology</a>
    <a href="investor.html">Investors</a>
</nav>

<section class="investor-section">
    <h1>Investor Relations</h1>
    <p>Partner with Zenith Space Industries in shaping the future of space exploration.</p>

    <div class="form-container">

        <form id="investor-form">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="tel" name="phone" placeholder="Phone Number">
            <textarea name="message" rows="4" placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>

        <div class="success-message" id="success-msg">
            ✅ Message sent successfully. Our team will contact you shortly.
        </div>

    </div>
</section>

<script>

document.getElementById("investor-form").addEventListener("submit", function(e) {
    e.preventDefault();

    emailjs.sendForm(
        "service_u8nde9e",
        "template_2ya8dv4",
        this
    ).then(function() {

        document.getElementById("success-msg").style.display = "block";
        document.getElementById("investor-form").reset();

    }, function(error) {

        alert("Something went wrong. Please try again.");

    });
});

</script>

</body>
</html>
